<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>রক্তদাতা ডিরেক্টরি — বাংলাদেশ</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Bengali:wght@400;600;700&family=Noto+Sans+Bengali:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root{--red:#C0392B;--red-dark:#922B21;--red-light:#FADBD8;--bg:#FDFCFB;--surface:#FFFFFF;--surface2:#F8F4F3;--border:#EAE0DF;--text:#1A0A09;--text2:#6B3A36;--text3:#A07070;--green:#1E8449;--green-bg:#D5F5E3;--amber:#B7770D;--amber-bg:#FEF9E7;--radius:12px;--shadow:0 2px 12px rgba(192,57,43,0.08);}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans Bengali',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  .hero{background:var(--red-dark);background-image:radial-gradient(ellipse at 20% 50%,rgba(231,76,60,.3) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(146,43,33,.4) 0%,transparent 50%);padding:3rem 1.5rem 2.5rem;text-align:center;position:relative;overflow:hidden;}
  .hero::before{content:'🩸';position:absolute;font-size:180px;opacity:.04;top:-20px;right:-20px;line-height:1;}
  .hero-badge{display:inline-block;background:rgba(255,255,255,.15);color:rgba(255,255,255,.9);font-size:12px;padding:4px 14px;border-radius:20px;border:1px solid rgba(255,255,255,.2);margin-bottom:1rem;}
  .hero h1{font-family:'Noto Serif Bengali',serif;font-size:clamp(1.6rem,5vw,2.4rem);color:#fff;font-weight:700;line-height:1.3;margin-bottom:.5rem;}
  .hero p{color:rgba(255,255,255,.75);font-size:14px;margin-bottom:1.5rem;}
  .hero-stats{display:flex;gap:1px;justify-content:center;background:rgba(255,255,255,.1);border-radius:12px;overflow:hidden;max-width:400px;margin:0 auto;}
  .hero-stat{flex:1;padding:.75rem .5rem;background:rgba(0,0,0,.15);}
  .hero-stat-num{font-size:1.5rem;font-weight:600;color:#fff;}
  .hero-stat-label{font-size:11px;color:rgba(255,255,255,.65);margin-top:2px;}
  .container{max-width:900px;margin:0 auto;padding:1.5rem 1rem;}
  .filter-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1.25rem;box-shadow:var(--shadow);}
  .filter-card h2{font-size:13px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:1rem;}
  .search-wrap{position:relative;margin-bottom:1rem;}
  .search-wrap input{width:100%;padding:10px 14px 10px 38px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;background:var(--surface2);color:var(--text);transition:border-color .2s;}
  .search-wrap input:focus{outline:none;border-color:var(--red);background:#fff;}
  .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:15px;}
  .filter-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
  @media(max-width:480px){.filter-row{grid-template-columns:1fr;}}
  select{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;background:var(--surface2);color:var(--text);cursor:pointer;}
  select:focus{outline:none;border-color:var(--red);}
  .blood-group-row{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px;}
  .bg-btn{padding:5px 13px;border:1px solid var(--border);border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;background:var(--surface2);color:var(--text2);transition:all .15s;font-family:inherit;}
  .bg-btn:hover{border-color:var(--red);color:var(--red);background:var(--red-light);}
  .bg-btn.active{background:var(--red);color:#fff;border-color:var(--red);}
  .result-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
  .result-bar span{font-size:13px;color:var(--text3);}
  .clear-btn{font-size:12px;color:var(--red);cursor:pointer;background:none;border:none;font-family:inherit;text-decoration:underline;}
  .donor-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;}
  .donor-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.1rem .9rem;transition:box-shadow .2s,border-color .2s;position:relative;}
  .donor-card:hover{box-shadow:var(--shadow);border-color:#D5B8B5;}
  .blood-badge{position:absolute;top:1rem;right:1rem;background:var(--red);color:#fff;font-size:12px;font-weight:600;padding:3px 10px;border-radius:10px;}
  .card-avatar{width:42px;height:42px;border-radius:50%;background:var(--red-light);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:var(--red-dark);margin-bottom:8px;}
  .card-name{font-weight:600;font-size:15px;color:var(--text);margin-bottom:2px;}
  .card-area{font-size:12px;color:var(--text3);margin-bottom:8px;}
  .card-divider{height:1px;background:var(--border);margin:8px 0;}
  .card-info{font-size:12px;color:var(--text2);margin-bottom:4px;display:flex;gap:6px;}
  .card-info strong{color:var(--text);}
  .status-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:500;margin-top:6px;}
  .status-pill.available{background:var(--green-bg);color:var(--green);}
  .status-pill.unavailable{background:var(--amber-bg);color:var(--amber);}
  .dot{width:6px;height:6px;border-radius:50%;background:currentColor;}
  .phone-toggle{width:100%;margin-top:10px;padding:7px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;font-size:12px;font-family:inherit;cursor:pointer;color:var(--text2);transition:all .15s;}
  .phone-toggle:hover{background:var(--red-light);color:var(--red);border-color:var(--red);}
  .phone-toggle.revealed{background:var(--red);color:#fff;border-color:var(--red);}
  .no-result{text-align:center;padding:4rem 1rem;color:var(--text3);font-size:14px;grid-column:1/-1;}
  .no-result div{font-size:3rem;margin-bottom:1rem;}
  footer{text-align:center;padding:2rem 1rem;font-size:12px;color:var(--text3);border-top:1px solid var(--border);margin-top:2rem;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .donor-card{animation:fadeIn .3s ease both;}
</style>
</head>
<body>

<script>
  const SHEET_URL = 'https://script.google.com/macros/s/AKfycbwf613xl-CEAr0cfC9B9tC3h1yEfm8YkZfRL_MqMRoy7JCUZzfzvo0I4SWlyYbVDyIdgw/exec'; // ← এখানে আপনার URL বসান
</script>

<div class="hero">
  <div class="hero-badge">🇧🇩 বাংলাদেশ</div>
  <h1>রক্তদাতা ডিরেক্টরি</h1>
  <p>রক্ত দিন — জীবন বাঁচান</p>
  <div class="hero-stats">
    <div class="hero-stat"><div class="hero-stat-num" id="statTotal">—</div><div class="hero-stat-label">মোট দাতা</div></div>
    <div class="hero-stat"><div class="hero-stat-num" id="statAvail">—</div><div class="hero-stat-label">এখন পাওয়া যাবে</div></div>
    <div class="hero-stat"><div class="hero-stat-num" id="statDivisions">—</div><div class="hero-stat-label">বিভাগ</div></div>
  </div>
</div>

<div class="container">
  <div class="filter-card">
    <h2>🔍 রক্তদাতা খুঁজুন</h2>
    <div class="search-wrap">
      <span class="search-icon">🔎</span>
      <input type="text" id="searchInput" placeholder="নাম বা এলাকা লিখুন..."/>
    </div>
    <div class="filter-row">
      <select id="divFilter"><option value="">সব বিভাগ</option><option>ঢাকা</option><option>চট্টগ্রাম</option><option>রাজশাহী</option><option>খুলনা</option><option>বরিশাল</option><option>সিলেট</option><option>রংপুর</option><option>ময়মনসিংহ</option></select>
      <select id="availFilter"><option value="">সব অবস্থা</option><option value="yes">এখন দিতে পারবেন</option><option value="no">এখন পারবেন না</option></select>
    </div>
    <div class="blood-group-row" id="bloodBtns">
      <button class="bg-btn active" data-v="">সব গ্রুপ</button>
      <button class="bg-btn" data-v="A+">A+</button><button class="bg-btn" data-v="A-">A-</button>
      <button class="bg-btn" data-v="B+">B+</button><button class="bg-btn" data-v="B-">B-</button>
      <button class="bg-btn" data-v="AB+">AB+</button><button class="bg-btn" data-v="AB-">AB-</button>
      <button class="bg-btn" data-v="O+">O+</button><button class="bg-btn" data-v="O-">O-</button>
    </div>
  </div>
  <div class="result-bar">
    <span id="resultCount">লোড হচ্ছে...</span>
    <button class="clear-btn" id="clearBtn">ফিল্টার মুছুন</button>
  </div>
  <div class="donor-grid" id="donorGrid">
    <div style="grid-column:1/-1;text-align:center;padding:3rem;color:#A07070;">⏳ ডেটা লোড হচ্ছে...</div>
  </div>
</div>
<footer>রক্তদাতা ডিরেক্টরি — বাংলাদেশ &nbsp;|&nbsp; রক্ত দিন, জীবন বাঁচান 🩸</footer>

<script>
let allDonors=[], bloodFilter='';

async function loadDonors() {
  try {
    const res = await fetch(SHEET_URL + '?' + new URLSearchParams({action:'get'}).toString());
    const text = await res.text();
    const data = JSON.parse(text);
    allDonors = data.donors || [];
    render();
  } catch(e) {
    document.getElementById('donorGrid').innerHTML = '<div class="no-result"><div>⚠️</div>ডেটা লোড হয়নি। Apps Script URL চেক করুন।</div>';
    document.getElementById('resultCount').textContent = 'ত্রুটি';
  }
}

function initials(n){const p=n.trim().split(' ');return p.length>1?p[0][0]+p[1][0]:p[0].slice(0,2);}
function daysSince(d){if(!d)return 999;return Math.floor((Date.now()-new Date(d))/86400000);}
function canDonate(d){return d.available!=='না'&&daysSince(d.lastDonate)>=90;}
function fmt(d){if(!d)return 'অজানা';const dt=new Date(d);return isNaN(dt)?d:`${dt.getDate()}/${dt.getMonth()+1}/${dt.getFullYear()}`;}
function ago(d){const n=daysSince(d);if(n===999)return '';if(n===0)return 'আজ';return `${n} দিন আগে`;}

function getFiltered(){
  const search=document.getElementById('searchInput').value.toLowerCase();
  const div=document.getElementById('divFilter').value;
  const avail=document.getElementById('availFilter').value;
  return allDonors.filter(d=>{
    if(bloodFilter&&d.blood!==bloodFilter)return false;
    if(div&&d.division!==div)return false;
    if(avail==='yes'&&!canDonate(d))return false;
    if(avail==='no'&&canDonate(d))return false;
    if(search&&!(d.name||'').toLowerCase().includes(search)&&!(d.area||'').toLowerCase().includes(search))return false;
    return true;
  });
}

function render(){
  const filtered=getFiltered();
  const avail=allDonors.filter(canDonate).length;
  const divs=[...new Set(allDonors.map(d=>d.division).filter(Boolean))].length;
  document.getElementById('statTotal').textContent=allDonors.length;
  document.getElementById('statAvail').textContent=avail;
  document.getElementById('statDivisions').textContent=divs;
  document.getElementById('resultCount').textContent=`${filtered.length} জন রক্তদাতা পাওয়া গেছে`;
  const grid=document.getElementById('donorGrid');
  if(!filtered.length){grid.innerHTML='<div class="no-result"><div>🔍</div>এই শর্তে কোনো রক্তদাতা পাওয়া যায়নি।</div>';return;}
  grid.innerHTML=filtered.map((d,i)=>{
    const ok=canDonate(d);
    return `<div class="donor-card" style="animation-delay:${i*.04}s">
      <div class="blood-badge">${d.blood||'?'}</div>
      <div class="card-avatar">${initials(d.name||'?')}</div>
      <div class="card-name">${d.name}</div>
      <div class="card-area">📍 ${d.area||''}, ${d.division||''}</div>
      <div class="card-divider"></div>
      <div class="card-info">সর্বশেষ দান: <strong>${fmt(d.lastDonate)}</strong>${d.lastDonate?' <span style="color:var(--text3)">('+ago(d.lastDonate)+')</span>':''}</div>
      <div class="status-pill ${ok?'available':'unavailable'}"><span class="dot"></span>${ok?'এখন দিতে পারবেন':'এখন পারবেন না'}</div>
      <button class="phone-toggle" onclick="togglePhone(this,'${d.phone||''}')">📞 ফোন নম্বর দেখুন</button>
    </div>`;
  }).join('');
}

function togglePhone(btn,phone){
  if(btn.dataset.shown){btn.textContent='📞 ফোন নম্বর দেখুন';btn.classList.remove('revealed');delete btn.dataset.shown;}
  else{btn.textContent='📞 '+(phone||'নম্বর নেই');btn.classList.add('revealed');btn.dataset.shown='1';}
}

document.querySelectorAll('#bloodBtns .bg-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('#bloodBtns .bg-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active'); bloodFilter=btn.dataset.v; render();
  });
});
document.getElementById('searchInput').addEventListener('input',render);
document.getElementById('divFilter').addEventListener('change',render);
document.getElementById('availFilter').addEventListener('change',render);
document.getElementById('clearBtn').addEventListener('click',()=>{
  document.getElementById('searchInput').value='';
  document.getElementById('divFilter').value='';
  document.getElementById('availFilter').value='';
  bloodFilter='';
  document.querySelectorAll('#bloodBtns .bg-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('#bloodBtns .bg-btn').classList.add('active');
  render();
});
loadDonors();
</script>
</body>
</html>
